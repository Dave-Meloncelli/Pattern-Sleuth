name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=pattern_sleuth --cov-report=term-missing
    
    - name: Validate package
      run: |
        pattern-sleuth validate
    - name: Test patterns (full registry)
      continue-on-error: true
      run: |
        pattern-sleuth test --registry pattern_sleuth/registry/patterns.json

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -e .
    
    - name: Check syntax (all Python files)
      run: python scripts/check_syntax.py
    
    - name: Scan self (repo must pass its own scan)
      run: |
        pattern-sleuth scan pattern_sleuth --json > scan-results.json
        cat scan-results.json
